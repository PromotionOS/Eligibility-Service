spring:
  datasource:
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}"
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    url: "jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}"
    user: ${PGUSER}
    password: ${PGPASSWORD}
